name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'
      - '!grading.json'

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Credentials
        run: |
          aws sts get-caller-identity
          echo "Account: $(aws sts get-caller-identity --query 'Account' --output text)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_student_id: ${{ secrets.STUDENT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Generate Grading JSON
        run: |
          terraform output -json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for key in data:
              if data[key].get('sensitive'):
                  data[key]['value'] = 'REDACTED-SEE-SUBMISSION-DOC'
          print(json.dumps(data, indent=2))
          " > ../grading.json

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit Grading JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update grading.json from terraform apply [skip ci]"
          file_pattern: "grading.json"
          repository: "."
          create_branch: false

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[ALERT] Terraform Apply Failed on Main',
              body: `Terraform apply failed.\n\n- Workflow: ${{ github.workflow }}\n- Commit: ${{ github.sha }}\n- Actor: ${{ github.actor }}\n- [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['terraform', 'bug']
            });
